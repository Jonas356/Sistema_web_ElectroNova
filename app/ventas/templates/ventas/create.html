{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-3">
    <div class="col-lg-7">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="{{ url_for('ventas.index') }}" class="btn btn-light rounded-circle p-2 d-inline-flex text-muted" style="border: 1px solid #e2e8f0;">
                <i class="bi bi-arrow-left fs-5"></i>
            </a>
            <div>
                <h4 class="fw-bold mb-0 text-dark">Nueva Venta Directa</h4>
                <p class="text-muted small mb-0">Selecciona el cliente y el artículo para emitir el comprobante de caja</p>
            </div>
        </div>

        <div class="cleo-card">
            <form method="POST" action="{{ url_for('ventas.create') }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Seleccionar Cliente</label>
                    <select name="cliente_id" class="form-select" required>
                        {% for c in clientes %}
                            <option value="{{ c.id }}">{{ c.nombre }} CI: {{ c.nit_ci }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Electrodoméstico solicitado</label>
                    <select name="producto_id" class="form-select" required>
                        {% for p in productos %}
                            <option value="{{ p.id }}">{{ p.nombre }} — {{ p.precio }} Bs. (Disponibles: {{ p.stock }})</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-semibold small text-muted">Cantidad a Comprar</label>
                    <input type="number" min="1" value="1" name="cantidad" class="form-control" id="cantidad" required>
                </div>
                
                <div class="d-flex justify-content-end gap-3 border-top pt-3">
                    <a href="{{ url_for('ventas.index') }}" class="btn btn-light px-4" style="border-radius: 10px; font-weight: 600; border: 1px solid #e2e8f0;">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-cleo-primary px-4">
                        Finalizar Transacción
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
