{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-3">
    <div class="col-lg-6">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="{{ url_for('clientes.index') }}" class="btn btn-light rounded-circle p-2 d-inline-flex text-muted" style="border: 1px solid #e2e8f0;">
                <i class="bi bi-arrow-left fs-5"></i>
            </a>
            <div>
                <h4 class="fw-bold mb-0 text-dark">Editar Cliente</h4>
                <p class="text-muted small mb-0">Actualiza los datos del cliente</p>
            </div>
        </div>

        <div class="cleo-card p-4">
            <form method="POST" action="{{ url_for('clientes.edit', id=cliente.id) }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Nombre</label>
                    <input type="text" name="nombre" class="form-control" value="{{ cliente.nombre }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">CI</label>
                    <input type="text" name="nit_ci" class="form-control" value="{{ cliente.nit_ci }}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold small text-muted">Número Celular</label>
                    <input type="text" name="telefono" class="form-control" value="{{ cliente.telefono if cliente.telefono else '' }}" placeholder="Ej. 77245612">
                </div>
                
                <div class="d-flex justify-content-end gap-3 border-top pt-3">
                    <a href="{{ url_for('clientes.index') }}" class="btn btn-light px-4" style="border-radius: 10px; font-weight: 600; border: 1px solid #e2e8f0;">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-cleo-primary px-4">
                        Actualizar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
