{% extends 'base.html' %}
{% block content %}
<div class="p-4 w-100 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="cleo-card p-4 p-sm-5 shadow-lg" style="border-radius: 20px; max-width: 420px; width: 100%;">
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 64px; height: 64px; background-color: rgba(48, 209, 190, 0.1);">
                <i class="bi bi-lightning-charge-fill fs-2" style="color: var(--cleo-primary);"></i>
            </div>
            <h4 class="fw-bold text-dark mb-1">ElectroNova</h4>
            <p class="text-muted small">Ingresa al panel administrativo</p>
        </div>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
                <label class="form-label fw-semibold small text-muted">Nombre de Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted" style="border-radius: 10px 0 0 10px;"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control border-start-0" required placeholder="admin o vendedor" style="border-radius: 0 10px 10px 0;">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold small text-muted">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted" style="border-radius: 10px 0 0 10px;"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" required placeholder="admin o vendedor" style="border-radius: 0 10px 10px 0;">
                </div>
            </div>
            <button type="submit" class="btn btn-cleo-primary w-100 py-2.5 mb-3" style="border-radius: 10px;">Ingresar al Sistema</button>
        </form>
    </div>
</div>
{% endblock %}
