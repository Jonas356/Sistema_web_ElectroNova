{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-3">
    <div class="col-lg-6">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="{{ url_for('auth.usuarios_index') }}" class="btn btn-light rounded-circle p-2 d-inline-flex text-muted" style="border: 1px solid #e2e8f0;">
                <i class="bi bi-arrow-left fs-5"></i>
            </a>
            <div>
                <h4 class="fw-bold mb-0 text-dark">Modificar Datos</h4>
                <p class="text-muted small mb-0">Actualiza los datos o cambia el rol en el sistema</p>
            </div>
        </div>

        <div class="cleo-card p-4">
            <form method="POST" action="{{ url_for('auth.edit_usuario', id=usuario.id) }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Nombre de Cuenta</label>
                    <input type="text" name="username" class="form-control" value="{{ usuario.username }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold small text-muted">Rol</label>
                    <select name="rol" class="form-select">
                        <option value="Administrador" {% if usuario.rol == 'Administrador' %}selected{% endif %}>Administrador</option>
                        <option value="Vendedor" {% if usuario.rol == 'Vendedor' %}selected{% endif %}>Vendedor</option>
                    </select>
                </div>
                
                <div class="d-flex justify-content-end gap-3 border-top pt-3">
                    <a href="{{ url_for('auth.usuarios_index') }}" class="btn btn-light px-4" style="border-radius: 10px; font-weight: 600; border: 1px solid #e2e8f0;">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-cleo-primary px-4">
                        Actualizar 
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
