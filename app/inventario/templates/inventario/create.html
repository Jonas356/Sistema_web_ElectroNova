{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-3">
    <div class="col-lg-8">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="{{ url_for('inventario.index') }}" class="btn btn-light rounded-circle p-2 d-inline-flex text-muted" style="border: 1px solid #e2e8f0;">
                <i class="bi bi-arrow-left fs-5"></i>
            </a>
            <div>
                <h4 class="fw-bold mb-0 text-dark">Registrar Electrodoméstico Nuevo</h4>
                <p class="text-muted small mb-0">Introduce las especificaciones del inventario de cocina</p>
            </div>
        </div>

        <div class="cleo-card">
            <form method="POST" action="{{ url_for('inventario.create') }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Nombre del Producto</label>
                    <input type="text" name="nombre" class="form-control" placeholder="Ej. Microondas" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Descripción</label>
                    <textarea name="descripcion" class="form-control" rows="2" placeholder="Detalles..."></textarea>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold small text-muted">Precio Unitario</label>
                        <input type="number" step="0.01" name="precio" class="form-control" placeholder="0" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold small text-muted">Stock Inicial</label>
                        <input type="number" name="stock" class="form-control" placeholder="Ej. 10" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-semibold small text-muted">Categoría</label>
                    <select name="categoria_id" class="form-select" required>
                        {% for cat in categorias %}
                            <option value="{{ cat.id }}">{{ cat.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="d-flex justify-content-end gap-3 border-top pt-3">
                    <a href="{{ url_for('inventario.index') }}" class="btn btn-light px-4" style="border-radius: 10px; font-weight: 600; border: 1px solid #e2e8f0;">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-cleo-primary px-4">
                        Guardar Producto
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
