{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-3">
    <div class="col-lg-8">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="{{ url_for('inventario.index') }}" class="btn btn-light rounded-circle p-2 d-inline-flex text-muted" style="border: 1px solid #e2e8f0;">
                <i class="bi bi-arrow-left fs-5"></i>
            </a>
            <div>
                <h4 class="fw-bold mb-0 text-dark">Actualizar Stock y Parámetros</h4>
                <p class="text-muted small mb-0">Ajusta los detalles de registro del producto #{{ producto.id }}</p>
            </div>
        </div>

        <div class="cleo-card">
            <form method="POST" action="{{ url_for('inventario.edit', id=producto.id) }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">Nombre del Producto</label>
                    <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold small text-muted">Precio Unitario (Bs.)</label>
                        <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold small text-muted">Inventario Total en Almacén</label>
                        <input type="number" name="stock" class="form-control" value="{{ producto.stock }}" required>
                        <div class="form-text text-muted" style="font-size: 0.78rem;">
                            <i class="bi bi-info-circle"></i> Aumentar o disminuir registrará un flujo automático de almacén.
                        </div>
                    </div>
                </div>
                
                <div class="d-flex justify-content-end gap-3 border-top pt-3">
                    <a href="{{ url_for('inventario.index') }}" class="btn btn-light px-4" style="border-radius: 10px; font-weight: 600; border: 1px solid #e2e8f0;">
                        Atrás
                    </a>
                    <button type="submit" class="btn btn-cleo-primary px-4">
                        Modificar Registro
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
