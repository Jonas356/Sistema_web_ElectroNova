{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center mt-3">
    <div class="col-lg-6">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a href="{{ url_for('inventario.index') }}" class="btn btn-light rounded-circle p-2 d-inline-flex text-muted" style="border: 1px solid #e2e8f0;">
                <i class="bi bi-arrow-left fs-5"></i>
            </a>
            <div>
                <h4 class="fw-bold mb-0 text-dark">Nueva Categoría de Cocina</h4>
                <p class="text-muted small mb-0">Define una nueva sección para clasificar tus electrodomésticos</p>
            </div>
        </div>

        <div class="cleo-card">
            <form method="POST" action="{{ url_for('inventario.create_categoria') }}">
                <div class="mb-4">
                    <label class="form-label fw-semibold small text-muted">Nombre de la Categoría</label>
                    <input type="text" name="nombre" class="form-control" placeholder="Ej. Licuadoras, Tostadoras, Microondas" required>
                </div>
                
                <div class="d-flex justify-content-end gap-3 border-top pt-3">
                    <a href="{{ url_for('inventario.index') }}" class="btn btn-light px-4" style="border-radius: 10px; font-weight: 600; border: 1px solid #e2e8f0;">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-cleo-primary px-4">
                        Guardar Categoría
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
